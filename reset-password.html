<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Clean Living</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d0d1a; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #1a1a2e; border-radius: 16px; padding: 32px 24px; width: 100%; max-width: 400px; border: 1px solid #333; }
    .logo { color: #c9a84c; font-size: 28px; font-weight: bold; text-align: center; margin-bottom: 6px; }
    .subtitle { color: #888; font-size: 14px; text-align: center; margin-bottom: 32px; }
    label { display: block; color: #c9a84c; font-size: 11px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; margin-top: 16px; }
    input { width: 100%; background: #0d0d1a; border: 1px solid #333; border-radius: 10px; padding: 14px; color: #fff; font-size: 15px; outline: none; }
    input:focus { border-color: #c9a84c; }
    button { width: 100%; background: #c9a84c; color: #0d0d1a; border: none; border-radius: 12px; padding: 16px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 24px; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .message { margin-top: 16px; padding: 12px; border-radius: 10px; font-size: 14px; text-align: center; display: none; }
    .message.success { background: rgba(46,204,113,0.15); border: 1px solid rgba(46,204,113,0.3); color: #2ecc71; }
    .message.error { background: rgba(231,76,60,0.15); border: 1px solid rgba(231,76,60,0.3); color: #e74c3c; }
    .back { display: block; text-align: center; color: #888; font-size: 13px; margin-top: 16px; text-decoration: none; }
    .back:hover { color: #c9a84c; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Clean Living</div>
    <div class="subtitle">Set your new password</div>

    <div id="form-section">
      <label>New Password</label>
      <input type="password" id="password" placeholder="At least 6 characters" />
      <label>Confirm Password</label>
      <input type="password" id="confirm" placeholder="Repeat your new password" />
      <button id="submit-btn" onclick="resetPassword()">Set New Password</button>
    </div>

    <div class="message" id="message"></div>
    <a href="https://cleanliving.app" class="back">← Back to Clean Living</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const { createClient } = supabase;
    const client = createClient(
      'https://gencdhyxlyekpjvuwvpu.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdlbmNkaHl4bHlla3BqdXd2cHUiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTY5NzY0NTM4MCwiZXhwIjoyMDEzMjIxMzgwfQ.IbNf0gKCkgmFsl4WFaVKBMpoRpBFqioxrPuBvbqzGQk'
    );

    function showMessage(text, type) {
      const el = document.getElementById('message');
      el.textContent = text;
      el.className = 'message ' + type;
      el.style.display = 'block';
    }

    async function resetPassword() {
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const btn = document.getElementById('submit-btn');

      if (!password) { showMessage('Please enter a new password', 'error'); return; }
      if (password.length < 6) { showMessage('Password must be at least 6 characters', 'error'); return; }
      if (password !== confirm) { showMessage('Passwords do not match', 'error'); return; }

      btn.disabled = true;
      btn.textContent = 'Saving...';

      const { error } = await client.auth.updateUser({ password });

      if (error) {
        showMessage('Error: ' + error.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Set New Password';
      } else {
        document.getElementById('form-section').style.display = 'none';
        showMessage('✓ Password updated! You can now sign in with your new password.', 'success');
        btn.style.display = 'none';
      }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Clean Living</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d0d1a;
      color: #fff;
      text-align: center;
      padding: 40px 20px;
      margin: 0;
    }
    .logo {
      font-size: 48px;
      margin-bottom: 20px;
    }
    h1 {
      color: #c9a84c;
      margin-bottom: 16px;
    }
    p {
      font-size: 18px;
      line-height: 1.5;
      max-width: 500px;
      margin: 0 auto 40px;
      color: #ccc;
    }
    .button {
      background: #c9a84c;
      color: #0d0d1a;
      padding: 16px 32px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 12px;
      text-decoration: none;
      display: inline-block;
    }
    .button:hover {
      background: #e8c97a;
    }
  </style>
</head>
<body>
  <div class="logo">🌿</div>
  <h1>Password Reset</h1>
  <p>We received a request to reset your password for Clean Living.</p>
  <p>Please open the app to set your new password.</p>
  
  <a href="cleanliving://reset-password" class="button">
    Open Clean Living App
  </a>
  
  <p style="margin-top: 60px; font-size: 14px; color: #666;">
    If the button doesn't work, make sure you have the Clean Living app installed.
  </p>
</body>
</html>

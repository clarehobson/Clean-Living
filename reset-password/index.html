<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Clean Living</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d0d1a; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #1a1a2e; border-radius: 16px; padding: 40px 32px; width: 100%; max-width: 380px; border: 1px solid #333; }
    .logo { color: #c9a84c; font-size: 24px; font-weight: 300; letter-spacing: 0.5px; text-align: center; margin-bottom: 8px; }
    .subtitle { color: #999; font-size: 13px; text-align: center; margin-bottom: 28px; letter-spacing: 0.3px; }
    label { display: block; color: #c9a84c; font-size: 10px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 6px; margin-top: 14px; }
    input { width: 100%; background: #0d0d1a; border: 1px solid #333; border-radius: 10px; padding: 12px 13px; color: #fff; font-size: 14px; outline: none; }
    input::placeholder { color: #666; font-size: 13px; }
    input:focus { border-color: #c9a84c; }
    button { width: 100%; background: #c9a84c; color: #0d0d1a; border: none; border-radius: 12px; padding: 13px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 22px; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .message { margin-top: 14px; padding: 11px; border-radius: 10px; font-size: 13px; text-align: center; display: none; }
    .message.success { background: rgba(46,204,113,0.12); color: #5fcf80; }
    .message.error { background: rgba(231,76,60,0.12); color: #ff6b6b; }
    .back { display: block; text-align: center; color: #888; font-size: 13px; margin-top: 18px; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Clean Living</div>
    <div class="subtitle">Set your new password</div>
    <div id="form-section">
      <label>New Password</label>
      <input type="password" id="password" placeholder="At least 6 characters" />
      <label>Confirm Password</label>
      <input type="password" id="confirm" placeholder="Repeat your new password" />
      <button id="submit-btn" onclick="resetPassword()">Set New Password</button>
    </div>
    <div class="message" id="message"></div>
    <a href="https://cleanliving.app" class="back">Back to Clean Living</a>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const client = supabase.createClient('https://gencdhyxlyekpjvuwvpu.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdlbmNkaHl4bHlla3BqdXd2cHUiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTY5NzY0NTM4MCwiZXhwIjoyMDEzMjIxMzgwfQ.IbNf0gKCkgmFsl4WFaVKBMpoRpBFqioxrPuBvbqzGQk');
    async function resetPassword() {
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const btn = document.getElementById('submit-btn');
      if (!password) { alert('Enter password'); return; }
      if (password.length < 6) { alert('Password must be 6+ chars'); return; }
      if (password !== confirm) { alert('Passwords do not match'); return; }
      btn.disabled = true;
      btn.textContent = 'Saving...';
      const { error } = await client.auth.updateUser({ password });
      if (error) { alert('Error: ' + error.message); btn.disabled = false; btn.textContent = 'Set New Password'; }
      else { document.getElementById('form-section').style.display = 'none'; document.getElementById('message').textContent = 'Password updated!'; document.getElementById('message').className = 'message success'; document.getElementById('message').style.display = 'block'; setTimeout(() => { window.location.href = 'https://cleanliving.app'; }, 2000); }
    }
  </script>
</body>
</html>

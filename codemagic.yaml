workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    integrations:
      app_store_connect: Clean Living
    environment:
      vars:
        BUNDLE_ID: "app.cleanliving"
        BUILD_NUMBER: "7"
      xcode: latest
    scripts:
      - name: Install CocoaPods
        script: |
          cd ios/src
          pod install
      - name: Set up keychain
        script: keychain initialize
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: Set up signing certificate
        script: keychain add-certificates
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Set build number
        script: |
          cd $CM_BUILD_DIR/ios/src
          agvtool new-version -all $BUILD_NUMBER
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/ios/src/Clean Living.xcworkspace" \
            --scheme "Clean Living"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false

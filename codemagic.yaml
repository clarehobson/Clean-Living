workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    integrations:
      app_store_connect: Clean Living
    environment:
      groups:
        - default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.cleanliving
      xcode: latest
    scripts:
      - name: Install CocoaPods
        script: |
          cd ios/src
          pod install
      - name: Build iOS
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/ios/src/Clean Living.xcworkspace" \
            --scheme "Clean Living"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
